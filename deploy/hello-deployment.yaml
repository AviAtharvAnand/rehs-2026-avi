apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-nginx
  namespace: rehs-2026-chatbot   # ← change this
spec:
  replicas: 2                   # two copies for redundancy
  selector:
    matchLabels:
      app: hello-nginx
  template:
    metadata:
      labels:
        app: hello-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.27
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi